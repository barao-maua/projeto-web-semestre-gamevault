<header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'core:home' %}">
                <span class="brand-mark">G</span>
                <span class="brand-text">
                    <span>Biblioteca Pessoal</span>
                    <strong>GameVault</strong>
                </span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'core:home' %}">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/library/' %}active{% endif %}" href="{% url 'core:library' %}">Minha Biblioteca</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/catalog/' %}active{% endif %}" href="{% url 'core:game_catalog' %}">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/profile/' %}active{% endif %}" href="{% url 'core:profile' %}">Perfil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/logout/' %}active{% endif %}" href="{% url 'core:logout' %}">Sair</a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'core:home' %}">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/sobre/' %}active{% endif %}" href="{% url 'core:sobre' %}">Biblioteca</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/diferenciais/' %}active{% endif %}" href="{% url 'core:diferenciais' %}">Avaliações</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/login/' %}active{% endif %}" href="{% url 'core:login' %}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/register/' %}active{% endif %}" href="{% url 'core:register' %}">Cadastro</a>
                    </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
</header>
